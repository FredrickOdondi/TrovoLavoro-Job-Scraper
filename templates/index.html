<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrovoLavoro Job Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #8892b0;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccd6f6;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(255,255,255,0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            font-size: 0.9rem;
            width: auto;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .status-panel {
            margin-bottom: 20px;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-idle { background: rgba(100, 116, 139, 0.3); color: #94a3b8; }
        .status-running { background: rgba(59, 130, 246, 0.3); color: #60a5fa; }
        .status-completed { background: rgba(34, 197, 94, 0.3); color: #4ade80; }
        .status-error { background: rgba(239, 68, 68, 0.3); color: #f87171; }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8892b0;
            margin-top: 5px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: rgba(30, 41, 59, 0.95);
            z-index: 10;
        }

        th {
            padding: 12px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .job-title {
            font-weight: 600;
            color: #00d4ff;
        }

        .company {
            color: #fbbf24;
        }

        .status-active {
            color: #4ade80;
        }

        .description {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #8892b0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8892b0;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 TrovoLavoro Job Scraper</h1>
            <p>Italian job listings from TrovoLavoro.com</p>
        </header>

        <div class="grid">
            <div class="panel">
                <h2>⚙️ Configuration</h2>
                <form id="configForm">
                    <div class="form-group">
                        <label>Search Keywords (optional)</label>
                        <input type="text" id="keywords" placeholder="e.g., informatica, ingegnere">
                        <small style="color: #64748b; font-size: 0.8rem;">Leave empty for all jobs</small>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Max Pages</label>
                            <input type="number" id="maxPages" value="5" min="1" max="20">
                        </div>
                        <div class="form-group">
                            <label>Max Jobs</label>
                            <input type="number" id="maxJobs" value="50" min="1" max="500">
                        </div>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="headless" checked>
                        <label for="headless">Run in background (headless)</label>
                    </div>

                    <button type="submit" class="btn btn-primary" id="startBtn">
                        ▶️ Start Scraping
                    </button>
                </form>
            </div>

            <div class="panel">
                <h2>📊 Results</h2>

                <div class="status-panel">
                    <div class="status-header">
                        <span class="status-badge status-idle" id="statusBadge">Idle</span>
                        <span id="currentPhase" style="color: #8892b0; font-size: 0.9rem;"></span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar"></div>
                    </div>
                    <p id="statusMessage" style="color: #8892b0; font-size: 0.9rem; margin-bottom: 15px;"></p>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="totalJobs">0</div>
                            <div class="stat-label">Jobs Found</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="scrapedJobs">0</div>
                            <div class="stat-label">Scraped</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="filteredJobs">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                    </div>
                </div>

                <div class="results-header" id="exportSection" style="display: none;">
                    <h3 style="font-size: 1rem;">Job Listings</h3>
                    <div class="export-buttons">
                        <button class="btn btn-secondary" onclick="exportCSV()">📄 Export CSV</button>
                        <button class="btn btn-secondary" onclick="exportJSON()">📋 Export JSON</button>
                    </div>
                </div>

                <div class="table-container" id="tableContainer">
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="80" height="80" style="margin-bottom: 20px; opacity: 0.3;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <p>Configure settings and click "Start Scraping" to begin</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pollInterval = null;
        let isRunning = false;

        const form = document.getElementById('configForm');
        const startBtn = document.getElementById('startBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (isRunning) return;

            const config = {
                keywords: document.getElementById('keywords').value,
                max_pages: document.getElementById('maxPages').value,
                max_jobs: document.getElementById('maxJobs').value,
                headless: document.getElementById('headless').checked
            };

            startBtn.disabled = true;
            startBtn.textContent = '⏳ Starting...';

            try {
                const response = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                if (response.ok) {
                    isRunning = true;
                    startPolling();
                }
            } catch (error) {
                console.error('Error:', error);
                startBtn.disabled = false;
                startBtn.textContent = '▶️ Start Scraping';
            }
        });

        function startPolling() {
            pollInterval = setInterval(checkStatus, 1500);
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                updateStatus(data);

                if (data.status === 'completed' || data.status === 'error') {
                    stopPolling();
                    isRunning = false;
                    startBtn.disabled = false;
                    startBtn.textContent = '▶️ Start Scraping';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function updateStatus(data) {
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge status-' + data.status;
            badge.textContent = data.status.charAt(0).toUpperCase() + data.status.slice(1);

            document.getElementById('currentPhase').textContent = data.current_phase || '';
            document.getElementById('statusMessage').textContent = data.message || '';

            document.getElementById('totalJobs').textContent = data.total_jobs || 0;
            document.getElementById('scrapedJobs').textContent = data.scraped_jobs || 0;
            document.getElementById('filteredJobs').textContent = (data.results || []).length;

            const progress = data.total_jobs > 0
                ? (data.scraped_jobs / data.total_jobs) * 100
                : (data.status === 'completed' ? 100 : 0);
            document.getElementById('progressBar').style.width = progress + '%';

            if (data.results && data.results.length > 0) {
                renderTable(data.results);
                document.getElementById('exportSection').style.display = 'flex';
            }
        }

        function renderTable(jobs) {
            const container = document.getElementById('tableContainer');

            if (jobs.length === 0) {
                container.innerHTML = `<div class="empty-state"><p>No jobs found</p></div>`;
                return;
            }

            const rows = jobs.map(job => `
                <tr>
                    <td class="job-title">${escapeHtml(job.job_title || 'N/A')}</td>
                    <td class="company">${escapeHtml(job.company || 'N/A')}</td>
                    <td>${escapeHtml(job.company_domain || 'N/A')}</td>
                    <td>${escapeHtml(job.job_location || 'N/A')}</td>
                    <td class="description" title="${escapeHtml(job.description || '')}">${escapeHtml(job.description || 'N/A')}</td>
                    <td><a href="${escapeHtml(job.job_post_url || '')}" target="_blank">View</a></td>
                    <td>${escapeHtml(job.date_posted || 'N/A')}</td>
                    <td>${escapeHtml(job.employment_type || 'N/A')}</td>
                    <td>${escapeHtml(job.salary || 'N/A')}</td>
                    <td class="status-active">${escapeHtml(job.status || 'N/A')}</td>
                </tr>
            `).join('');

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Company</th>
                            <th>Domain</th>
                            <th>Location</th>
                            <th>Description</th>
                            <th>URL</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Salary</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function exportCSV() {
            window.location.href = '/api/export/csv';
        }

        function exportJSON() {
            window.location.href = '/api/export/json';
        }
    </script>
</body>
</html>
